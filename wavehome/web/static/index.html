<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>waveHome Workflow Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">waveHome</p>
      <h1>Workflow block editor</h1>
      <p class="subtitle">Build gesture combinations, timings, confirmations, and lamp actions without hardcoding Python rules.</p>
    </div>

    <nav class="toolbar">
      <button id="reload" type="button">Reload</button>
      <button id="validate" type="button">Validate</button>
      <button id="save" type="button" class="primary">Save rules</button>
      <button id="reset" type="button" class="danger">Reset defaults</button>
    </nav>
  </header>

  <section id="message" class="message info">Loading...</section>

  <main class="layout">
    <section class="main-panel">
      <div class="panel-heading">
        <div>
          <h2>Rules</h2>
          <p id="rule-count" class="muted">0 rules</p>
        </div>
        <button type="button" data-op="add-rule">Add blank rule</button>
      </div>

      <div id="rules" class="rules-list"></div>
    </section>

    <aside class="side-panel">
      <section class="panel">
        <h2>Presets</h2>
        <p class="muted">Fast-start blocks for safe gesture control.</p>
        <div id="presets" class="preset-list"></div>
      </section>

      <section class="panel">
        <h2>Capabilities</h2>
        <div id="capabilities"></div>
      </section>

      <section class="panel raw-panel">
        <div class="panel-heading compact">
          <h2>Raw JSON</h2>
          <button id="format" type="button">Format JSON</button>
        </div>
        <textarea id="raw-json" spellcheck="false"></textarea>
      </section>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
